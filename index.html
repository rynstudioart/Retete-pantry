<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rețete</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#2a2118;
    --accent:#b3401d;
    --accent-soft:#f7e9e1;
    --muted:#8a7d6c;
    --line:#ece4d8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    text-align:center;
    padding:28px 16px 6px;
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(34px,8vw,52px);
    margin:0;
    letter-spacing:0.5px;
  }
  header .subtitle{
    margin:4px 0 0;
    font-size:13px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .stage{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:18px 8px 4px;
    flex:1;
  }
  .nav-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:30px;
    line-height:1;
    width:36px;
    height:64px;
    cursor:pointer;
    flex-shrink:0;
    transition:color .2s;
    font-family:serif;
  }
  .nav-btn:hover{color:var(--accent);}
  .card-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:min(78vw,400px);
    touch-action:pan-y;
    user-select:none;
  }
  .index-tab{
    background:var(--accent);
    color:#fff;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:20px 20px 0 0;
    font-weight:600;
    transform:translateY(1px);
  }
  .card{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 18px 38px -14px rgba(42,33,24,0.28), 0 0 0 1px var(--line);
    cursor:pointer;
    background:#f2ece3;
  }
  .card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    pointer-events:none;
  }
  .card .hint-badge{
    position:absolute;
    bottom:10px;
    right:10px;
    background:rgba(255,255,255,0.92);
    color:var(--ink);
    font-size:11.5px;
    font-weight:600;
    padding:7px 12px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:5px;
    pointer-events:none;
  }
  .card .hint-badge::before{
    content:"";
    width:7px;height:7px;
    border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }
  .eyebrow{
    margin:18px 0 4px;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    text-align:center;
  }
  .recipe-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(21px,5vw,27px);
    margin:2px 0 0;
    text-align:center;
    line-height:1.25;
    min-height:1.3em;
  }
  .counter{
    margin-top:10px;
    font-size:12.5px;
    color:var(--muted);
    letter-spacing:0.5px;
  }
  .swipe-hint{
    font-size:12px;
    color:var(--muted);
    margin:6px 0 22px;
    text-align:center;
    transition:opacity .4s ease;
  }
  .swipe-hint.hidden{opacity:0;}

  /* popup */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(20,15,10,0.55);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.open{
    opacity:1;
    pointer-events:auto;
  }
  .popup{
    background:var(--bg);
    width:100%;
    max-width:560px;
    max-height:86vh;
    overflow-y:auto;
    border-radius:22px 22px 0 0;
    padding:28px 26px 34px;
    cursor:pointer;
    transform:translateY(30px);
    transition:transform .28s ease;
  }
  .overlay.open .popup{transform:translateY(0);}
  .popup-category{
    font-size:11.5px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
  }
  .popup h2{
    font-family:'Fraunces',serif;
    font-size:26px;
    margin:6px 0 18px;
  }
  .popup h3{
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin:18px 0 8px;
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
  }
  .popup ul, .popup ol{
    margin:0;
    padding-left:20px;
    font-size:15.5px;
    line-height:1.65;
  }
  .popup li{margin-bottom:5px;}
  .close-hint{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    margin:24px 0 0;
    letter-spacing:0.5px;
  }
  @media (max-width:420px){
    .nav-btn{width:26px;font-size:24px;}
  }
</style>
</head>
<body>

<header>
  <h1>Rețete</h1>
  <p class="subtitle">Bucătăria românească</p>
</header>

<div class="stage" id="stage">
  <button class="nav-btn" id="prevBtn" aria-label="Rețeta anterioară">‹</button>

  <div class="card-wrap" id="cardWrap">
    <div class="index-tab" id="indexTab"></div>
    <div class="card" id="card">
      <img id="recipeImg" src="" alt="">
      <div class="hint-badge">Apasă pentru preparare</div>
    </div>
    <p class="eyebrow" id="eyebrow"></p>
    <h2 class="recipe-name" id="recipeName"></h2>
    <p class="counter" id="counter"></p>
  </div>

  <button class="nav-btn" id="nextBtn" aria-label="Rețeta următoare">›</button>
</div>

<p class="swipe-hint" id="swipeHint">← glisează pentru rețeta anterioară&nbsp;&nbsp;/&nbsp;&nbsp;următoarea →</p>

<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <span class="popup-category" id="popCategory"></span>
    <h2 id="popName"></h2>
    <h3>Ingrediente</h3>
    <ul id="popIngredients"></ul>
    <h3>Mod de preparare</h3>
    <ol id="popSteps"></ol>
    <p class="close-hint">Apasă oriunde pentru a închide</p>
  </div>
</div>

<script>
function commons(name){
  var fixed = name.replace(/ /g,'_');
  return 'https://commons.wikimedia.org/wiki/Special:FilePath/' + encodeURIComponent(fixed).replace(/%2F/g,'/') + '?width=900';
}
function pexels(id){
  return 'https://images.pexels.com/photos/' + id + '/pexels-photo-' + id + '.jpeg?auto=compress&cs=tinysrgb&w=900';
}

var CAT1 = "Supe și ciorbe";
var CAT2 = "Mâncăruri tradiționale românești";
var CAT3 = "Garnituri și preparate simple";

var recipes = [
{cat:CAT1, name:"Supă de roșii cu tăiței de casă", img:commons("Tomato soup, grzanki.JPG"),
 ing:["1 kg roșii sau bulion","1 ceapă","1 morcov","1 cartof","tăiței de casă","ulei, sare, piper","pătrunjel verde"],
 steps:["Călește ceapa și morcovul tăiate mărunt în ulei.","Adaugă roșiile sau bulionul și apă, lasă să fiarbă 20 de minute.","Pune cartofii cubulețe și fierbe până se înmoaie.","Adaugă tăițeii de casă și mai fierbe 5-7 minute.","Asezonează cu sare, piper și pătrunjel proaspăt."]},

{cat:CAT1, name:"Supă de pui cu tăiței", img:pexels(30392957),
 ing:["pulpe de pui","morcov, păstârnac, țelină","1 ceapă","tăiței","sare, piper"],
 steps:["Fierbe puiul cu legumele întregi în apă cu sare, la foc mic, 40-50 de minute, spumând des.","Scoate carnea, dezosează și taie cubulețe.","Strecoară supa și taie legumele felii.","Pune carnea, legumele și tăițeii înapoi în supă, mai fierbe 5 minute.","Drege cu pătrunjel verde proaspăt."]},

{cat:CAT1, name:"Ciorbă de legume", img:pexels(1893563),
 ing:["cartofi, morcov, ardei","fasole verde","roșii","1 ceapă","borș sau zeamă acră","verdeață"],
 steps:["Călește ceapa și morcovul, apoi adaugă restul legumelor tăiate cubulețe.","Adaugă apă caldă și fierbe 20-25 de minute.","Pune roșiile și acrește cu borș sau zeamă de lămâie.","Mai fierbe 5 minute și presară verdeață la final."]},

{cat:CAT1, name:"Ciorbă de cartofi", img:pexels(3559899),
 ing:["cartofi","1 ceapă, morcov, ardei","smântână","ou (opțional)","zeamă acră","leuștean"],
 steps:["Călește ceapa, morcovul și ardeiul în puțin ulei.","Adaugă cartofii cubulețe și apă, fierbe 20 de minute.","Acrește cu zeamă de varză sau lămâie.","Drege cu smântână și ou bătut, presară leuștean."]},

{cat:CAT1, name:"Ciorbă de fasole", img:pexels(1907227),
 ing:["fasole boabe înmuiată","afumătură sau costiță","1 ceapă, morcov, ardei","roșii","zeamă acră"],
 steps:["Fierbe fasolea în apă până se înmoaie pe jumătate.","Călește afumătura cu ceapa, morcovul și ardeiul.","Adaugă în oala de fasole, împreună cu roșiile.","Acrește la final și mai fierbe 10 minute la foc mic."]},

{cat:CAT1, name:"Ciorbă de perișoare", img:pexels(27098505),
 ing:["carne tocată","orez","1 ceapă, ou","morcov, roșii","zeamă acră","leuștean"],
 steps:["Amestecă carnea cu orezul, ceapa rasă, oul și condimente, formează perișoare mici.","Pune la fiert într-o supă de legume cu morcov, ceapă și roșii.","Lasă să fiarbă 25-30 de minute, la foc mic.","Acrește cu zeamă de lămâie și presară leuștean."]},

{cat:CAT1, name:"Ciorbă rădăuțeană", img:commons("Chicken soup.jpeg"),
 ing:["piept de pui","morcov, țelină","usturoi","smântână, ouă","oțet sau zeamă de lămâie"],
 steps:["Fierbe puiul cu legumele în apă cu sare, 40 de minute.","Scoate carnea, taie fâșii, strecoară supa.","Bate smântâna cu gălbenușurile și usturoiul pisat, drege supa fierbinte.","Adaugă carnea înapoi și acrește cu oțet, fără a mai fierbe tare."]},

{cat:CAT1, name:"Ciorbă de pui a la grec", img:pexels(30392957),
 ing:["piept de pui","orez","morcov","ou, lămâie","smântână"],
 steps:["Fierbe puiul cu morcovul în apă cu sare.","Scoate carnea, taie cubulețe, strecoară zeama și adaugă orezul.","Fierbe orezul 15 minute.","Drege cu ou și zeamă de lămâie bătute cu puțină supă caldă, fără să mai fiarbă."]},

{cat:CAT1, name:"Borș de pui", img:commons("Chicken soup.jpeg"),
 ing:["pulpe de pui","morcov, țelină, ceapă","roșii","borș sau zeamă acră","verdeață"],
 steps:["Fierbe puiul cu legumele întregi, 40 de minute.","Scoate carnea, taie cubulețe, strecoară zeama.","Adaugă roșiile tăiate și mai fierbe 10 minute.","Acrește cu borș, adaugă carnea înapoi, presară verdeață."]},

{cat:CAT1, name:"Supă de găluște", img:pexels(1907227),
 ing:["zeamă de carne sau legume","gris","ou","unt","pătrunjel"],
 steps:["Pregătește o supă de bază din legume sau carne.","Freacă untul cu oul, grișul și pătrunjelul pentru găluște.","Formează bilute mici cu o linguriță.","Fierbe găluștele direct în supa caldă 5-7 minute, până se umflă."]},

{cat:CAT1, name:"Supă de ciuperci", img:pexels(2365940),
 ing:["ciuperci","1 ceapă","smântână","unt, făină","pătrunjel"],
 steps:["Călește ceapa în unt, adaugă ciupercile feliate.","Presară puțină făină și adaugă apă sau supă de legume.","Fierbe 15 minute la foc mic.","Drege cu smântână și pătrunjel proaspăt."]},

{cat:CAT1, name:"Supă cremă de dovleac", img:pexels(17302314),
 ing:["dovleac","1 ceapă, cartof","smântână sau lapte","unt","nucșoară"],
 steps:["Călește ceapa în unt, adaugă dovleacul și cartoful cubulețe.","Adaugă apă sau supă și fierbe până se înmoaie.","Pasează cu blenderul până devine cremă fină.","Adaugă smântână, nucșoară și sare după gust."]},

{cat:CAT1, name:"Ciorbă de varză", img:pexels(1893563),
 ing:["varză albă","afumătură","1 ceapă, morcov","roșii","zeamă acră"],
 steps:["Călește afumătura cu ceapa și morcovul.","Adaugă varza tăiată fideluță și apă.","Fierbe 25-30 de minute.","Acrește la final cu zeamă acră, mai fierbe 5 minute."]},

{cat:CAT1, name:"Ciorbă de dovlecei", img:pexels(2365940),
 ing:["dovlecei","1 ceapă, morcov","ou, smântână","leuștean"],
 steps:["Călește ceapa și morcovul, adaugă dovleceii cubulețe.","Adaugă apă și fierbe 15 minute.","Drege cu ou și smântână bătute împreună.","Presară leuștean proaspăt la final."]},

{cat:CAT1, name:"Supă de roșii cu găluște", img:commons("Tomato soup, grzanki.JPG"),
 ing:["roșii sau bulion","1 ceapă, morcov","gris, ou, unt"],
 steps:["Pregătește o supă de roșii ca la rețeta clasică.","Freacă untul cu oul și grișul pentru găluște.","Formează bilute mici cu o linguriță.","Fierbe-le în supă caldă 5-7 minute, până se umflă."]},

{cat:CAT2, name:"Tocăniță de cartofi", img:commons("Tocăniță de murături.jpg"),
 ing:["cartofi","1 ceapă, ardei","roșii","boia, ulei","verdeață"],
 steps:["Călește ceapa în ulei, adaugă boia.","Pune cartofii cubulețe și ardeiul.","Adaugă roșiile sau bulionul și puțină apă.","Fierbe înăbușit 25-30 de minute, presară verdeață."]},

{cat:CAT2, name:"Tocăniță de pui", img:commons("Tochitura-moldoveneasca.jpg"),
 ing:["pulpe de pui","1 ceapă, ardei","roșii","boia, usturoi"],
 steps:["Rumenește puiul în ulei, apoi scoate-l din tigaie.","Călește ceapa și ardeiul în aceeași tigaie.","Adaugă boia, roșiile și puiul înapoi.","Înăbușă cu capac 30-35 de minute, la foc mic."]},

{cat:CAT2, name:"Tocăniță de porc", img:commons("Tochitura-moldoveneasca.jpg"),
 ing:["carne de porc","1 ceapă, ardei","roșii","boia, foi de dafin"],
 steps:["Rumenește carnea în ulei, pe toate părțile.","Adaugă ceapa și ardeiul, călește puțin.","Pune boia, roșiile și foile de dafin.","Înăbușă cu capac 40-50 de minute, până carnea e fragedă."]},

{cat:CAT2, name:"Papricaș de pui", img:commons("Tochitura-moldoveneasca.jpg"),
 ing:["pulpe de pui","1 ceapă, ardei","boia dulce","smântână, făină"],
 steps:["Călește ceapa în ulei, adaugă boia.","Pune puiul și ardeiul, rumenește puțin.","Adaugă apă și înăbușă 30 de minute cu capac.","Drege cu smântână amestecată cu puțină făină, mai fierbe 5 minute."]},

{cat:CAT2, name:"Ciulama de pui", img:commons("Ciulama de pui.jpg"),
 ing:["piept de pui fiert","unt, făină","lapte sau supă","pătrunjel"],
 steps:["Fierbe puiul, scoate carnea și taie fâșii.","Topește untul, adaugă făina și călește puțin (rântaș).","Adaugă lapte sau supă strecurată, treptat, amestecând continuu.","Pune carnea în sos, fierbe 5 minute, presară pătrunjel."]},

{cat:CAT2, name:"Ciulama de ciuperci", img:commons("Ciulama cu ciuperci de padure.jpg"),
 ing:["ciuperci","unt, făină","lapte sau supă","usturoi, pătrunjel"],
 steps:["Călește ciupercile feliate în unt, până lasă apa.","Presară făina și amestecă bine.","Adaugă lapte sau supă treptat, amestecând să nu facă cocoloașe.","Fierbe 10 minute, adaugă usturoi și pătrunjel."]},

{cat:CAT2, name:"Mâncare de mazăre", img:pexels(1893563),
 ing:["mazăre verde sau congelată","1 ceapă, morcov","ulei","pătrunjel"],
 steps:["Călește ceapa și morcovul în ulei.","Adaugă mazărea și puțină apă.","Fierbe înăbușit 15-20 de minute.","Presară pătrunjel proaspăt la final."]},

{cat:CAT2, name:"Mâncare de fasole verde", img:pexels(185473),
 ing:["fasole verde","1 ceapă","roșii","ulei, mărar"],
 steps:["Călește ceapa în ulei.","Adaugă fasolea verde tăiată și roșiile.","Adaugă puțină apă și înăbușă 20-25 de minute, cu capac.","Presară mărar proaspăt la final."]},

{cat:CAT2, name:"Mâncare de spanac cu ou", img:pexels(2365940),
 ing:["spanac","1 ceapă, usturoi","ouă","smântână"],
 steps:["Călește ceapa și usturoiul.","Adaugă spanacul și lasă-l să se înmoaie.","Toarnă smântâna și omogenizează.","Fă mici cuiburi, spart ouăle peste și lasă 5 minute cu capac."]},

{cat:CAT2, name:"Iahnie de fasole", img:pexels(1907227),
 ing:["fasole boabe","1 ceapă","roșii","ulei, foi de dafin"],
 steps:["Fierbe fasolea înmuiată până se înmoaie.","Călește ceapa, adaugă roșiile.","Combină cu fasolea fiartă și foile de dafin.","Fierbe împreună 15-20 de minute, la foc mic."]},

{cat:CAT2, name:"Fasole scăzută cu cârnați", img:pexels(3559899),
 ing:["fasole fiartă","cârnați","1 ceapă","roșii sau bulion","boia"],
 steps:["Rumenește cârnații feliați.","Călește ceapa în aceeași tigaie, adaugă boia.","Pune fasolea fiartă și bulionul.","Fierbe 15 minute, până sosul se îngroașă."]},

{cat:CAT2, name:"Varză călită", img:commons("Tocăniță de murături.jpg"),
 ing:["varză albă","1 ceapă","roșii sau bulion","ulei, boia"],
 steps:["Călește ceapa în ulei, adaugă boia.","Pune varza tăiată fideluță.","Adaugă bulion și puțină apă.","Înăbușă 30-40 de minute, până varza e moale."]},

{cat:CAT2, name:"Varză cu carne", img:commons("Tocăniță de murături.jpg"),
 ing:["varză","carne de porc","1 ceapă","roșii, boia","foi de dafin"],
 steps:["Rumenește carnea, apoi scoate-o din oală.","Călește ceapa, adaugă boia și varza.","Pune carnea înapoi, cu roșiile și foile de dafin.","Înăbușă 45-60 de minute, la foc mic."]},

{cat:CAT2, name:"Ardei umpluți", img:commons("Sarmale.jpg"),
 ing:["ardei grași","carne tocată, orez","1 ceapă","roșii pentru sos","mărar"],
 steps:["Amestecă carnea cu orezul, ceapa rasă, mărar și condimente.","Umple ardeii goliți cu acest amestec.","Așază-i într-o oală și acoperă cu sos de roșii.","Fierbe înăbușit 40-45 de minute."]},

{cat:CAT2, name:"Sarmale (în porție mică)", img:commons("Sarmale.jpg"),
 ing:["foi de varză murată","carne tocată, orez","1 ceapă","afumătură","bulion"],
 steps:["Amestecă carnea cu orezul, ceapa călită și condimente.","Pune o lingură din amestec pe fiecare foaie de varză și rulează.","Așază sarmalele în oală, cu afumătură între ele, adaugă bulion și apă.","Fierbe înăbușit 2-3 ore, la foc mic."]},

{cat:CAT2, name:"Chiftele marinate", img:pexels(27098505),
 ing:["carne tocată","pâine, ou","1 ceapă","roșii pentru sos","oțet"],
 steps:["Amestecă carnea cu pâinea înmuiată, oul, ceapa și condimente.","Formează chiftele și prăjește-le în ulei.","Pregătește un sos din roșii, oțet și puțin zahăr.","Pune chiftelele în sos și lasă la marinat la rece câteva ore."]},

{cat:CAT2, name:"Ostropel de pui", img:commons("Tochitura-moldoveneasca.jpg"),
 ing:["pulpe de pui","usturoi mult","roșii, ardei","vin alb (opțional)"],
 steps:["Rumenește puiul în ulei, până se rumenește bine.","Adaugă usturoiul pisat și ardeiul.","Pune roșiile (și vinul, opțional).","Înăbușă 30 de minute, până sosul se reduce."]},

{cat:CAT2, name:"Ficăței de pui cu ceapă", img:commons("Chicken soup.jpeg"),
 ing:["ficăței de pui","1 ceapă mare","ulei, boia","pătrunjel"],
 steps:["Călește ceapa în ulei până se înmoaie.","Adaugă ficățeii și prăjește 5-7 minute.","Presară boia și sare.","Stinge cu puțină apă, mai fierbe 5 minute, presară pătrunjel."]},

var current = 0;
var total = recipes.length;

var cardWrap = document.getElementById('cardWrap');
var img = document.getElementById('recipeImg');
var eyebrow = document.getElementById('eyebrow');
var nameEl = document.getElementById('recipeName');
var counter = document.getElementById('counter');
var indexTab = document.getElementById('indexTab');
var swipeHint = document.getElementById('swipeHint');
var overlay = document.getElementById('overlay');
var popup = document.getElementById('popup');
var popCategory = document.getElementById('popCategory');
var popName = document.getElementById('popName');
var popIngredients = document.getElementById('popIngredients');
var popSteps = document.getElementById('popSteps');

function renderContent(){
  var r = recipes[current];
  img.src = r.img;
  img.alt = r.name;
  eyebrow.textContent = r.cat;
  nameEl.textContent = r.name;
  counter.textContent = (current+1) + " / " + total;
  indexTab.textContent = "Rețeta " + (current+1);
}

function animateTo(newIndex, dir){
  cardWrap.style.transition = 'transform .22s ease, opacity .22s ease';
  cardWrap.style.transform = 'translateX(' + (dir*-36) + 'px)';
  cardWrap.style.opacity = '0';
  setTimeout(function(){
    current = newIndex;
    renderContent();
    cardWrap.style.transition = 'none';
    cardWrap.style.transform = 'translateX(' + (dir*36) + 'px)';
    requestAnimationFrame(function(){
      cardWrap.style.transition = 'transform .22s ease, opacity .22s ease';
      cardWrap.style.transform = 'translateX(0)';
      cardWrap.style.opacity = '1';
    });
  }, 220);
  hideHint();
}

function goNext(){
  var n = (current + 1) % total;
  animateTo(n, 1);
}
function goPrev(){
  var n = (current - 1 + total) % total;
  animateTo(n, -1);
}

function hideHint(){
  swipeHint.classList.add('hidden');
}

document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);

document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowRight') goNext();
  if(e.key === 'ArrowLeft') goPrev();
});

/* swipe + tap-to-open via Pointer Events */
var card = document.getElementById('card');
var startX = 0, startY = 0, dragged = false;

card.addEventListener('pointerdown', function(e){
  startX = e.clientX;
  startY = e.clientY;
  dragged = false;
});
card.addEventListener('pointermove', function(e){
  if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10){
    dragged = true;
  }
});
card.addEventListener('pointerup', function(e){
  var deltaX = e.clientX - startX;
  if (Math.abs(deltaX) > 45){
    dragged = true;
    if (deltaX < 0) { goNext(); } else { goPrev(); }
  }
});
card.addEventListener('click', function(){
  if (!dragged){
    openPopup();
  }
});

function openPopup(){
  var r = recipes[current];
  popCategory.textContent = r.cat;
  popName.textContent = r.name;
  popIngredients.innerHTML = '';
  r.ing.forEach(function(item){
    var li = document.createElement('li');
    li.textContent = item;
    popIngredients.appendChild(li);
  });
  popSteps.innerHTML = '';
  r.steps.forEach(function(step){
    var li = document.createElement('li');
    li.textContent = step;
    popSteps.appendChild(li);
  });
  overlay.classList.add('open');
}

overlay.addEventListener('click', function(){
  overlay.classList.remove('open');
});

renderContent();

setTimeout(hideHint, 5000);
</script>
